name: DevRadar Daily

on:
  workflow_dispatch:

  schedule:
    - cron: "0 7 * * *"
      timezone: "Asia/Ho_Chi_Minh"

jobs:
  run-daily:
    name: Collect tech news and generate digest
    runs-on: ubuntu-latest

    timeout-minutes: 60

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}

      SOURCE_LIMIT_PER_RUN: ${{ secrets.SOURCE_LIMIT_PER_RUN }}
      GEMINI_DELAY_MS: ${{ secrets.GEMINI_DELAY_MS }}

      DIGEST_MAX_ARTICLES: ${{ secrets.DIGEST_MAX_ARTICLES }}
      DIGEST_LOOKBACK_HOURS: ${{ secrets.DIGEST_LOOKBACK_HOURS }}

      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN_DEV }}

      USER_AGENT: "DevRadar/1.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run DevRadar daily job
        run: npm run daily